<!DOCTYPE html>
<html>
<head>
    <title>Map Display</title>
    <style>
        #map {
            height: 400px;
            width: 100%;
        }
        .image {
            height: 400px;
            width: 100%;
            object-fit: cover;
        }
    </style>
    <script async defer
    src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&callback=initMap">
    </script>
    <script>
        function initMap() {
            var location = {lat: -34.397, lng: 150.644};
            var map = new google.maps.Map(document.getElementById('map'), {
                zoom: 8,
                center: location
            });
            var marker = new google.maps.Marker({
                position: location,
                map: map
            });
        }
    </script>
</head>
<body>
    <h1>Welcome</h1>
    <div id="map"></div>
    <img src="entry.jpg" class="image" alt="Entry">
</body>
</html>
